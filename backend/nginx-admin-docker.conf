# Admin-only HTTP server (backend_admin container).
# Blocks the React PWA/service worker so browsers cannot keep serving the main
# app from a previously registered worker on this port.
server {
    listen 80;
    client_max_body_size 10M;
    server_name localhost;
    root /var/www/public;
    index index.php index.html index.htm;

    location ^~ /docs/ {
        alias /var/www/public/docs/;
        index index.html;
        try_files $uri $uri/ /docs/index.html;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # React PWA assets must not be served from the admin container.
    location = /sw.js { return 404; }
    location ~ ^/workbox-.*\.js$ { return 404; }
    location = /build/sw.js { return 404; }
    location ~ ^/build/workbox-.*\.js$ { return 404; }
    location ~ ^/site.*\.webmanifest$ { return 404; }
    location ~ ^/build/site.*\.webmanifest$ { return 404; }
    location = /offline.html { return 404; }
    location ^~ /build/ { return 404; }

    location ~ ^/(favicon\.ico|apple-touch-icon\.png|icon-[0-9]+\.png)$ {
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        alias /var/www/public/storage/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php-fpm/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
        fastcgi_param X-Forwarded-Proto $scheme;
    }

    location ~ /\.ht {
        deny all;
    }

    add_header Content-Security-Policy "frame-ancestors 'self' https://project.meo-mai-moi.com" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/rss+xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
