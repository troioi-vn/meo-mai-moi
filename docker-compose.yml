name: meo-mai-moi

x-backend-common: &backend-common
  build:
    context: .
    dockerfile: ./backend/Dockerfile
    args:
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-}
      VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
      VITE_UMAMI_URL: ${VITE_UMAMI_URL:-}
      VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
      VITE_UMAMI_DOMAINS: ${VITE_UMAMI_DOMAINS:-}
      VITE_UMAMI_DEBUG: ${VITE_UMAMI_DEBUG:-}
      VITE_UMAMI_LAZY_LOAD: ${VITE_UMAMI_LAZY_LOAD:-}
  image: ${BACKEND_IMAGE:-meomaimoi/backend:local}
  pull_policy: ${BACKEND_IMAGE_PULL_POLICY:-missing}
  env_file:
    - ./backend/.env
  environment:
    - RUN_MIGRATIONS=false
    - IGNORE_OPTIMIZE_CLEAR_FAILURE=true
    - PUSHER_APP_ID=${PUSHER_APP_ID:-}
    - PUSHER_APP_KEY=${PUSHER_APP_KEY:-}
    - PUSHER_APP_SECRET=${PUSHER_APP_SECRET:-}
    - PUSHER_HOST=${PUSHER_HOST:-}
    - PUSHER_PORT=${PUSHER_PORT:-}
    - PUSHER_SCHEME=${PUSHER_SCHEME:-}
    - PUSHER_APP_CLUSTER=${PUSHER_APP_CLUSTER:-}
  volumes:
    - ./backend/.env:/var/www/.env:ro
    - uploads_data:/var/www/storage/app/public
    - logs_data:/var/www/storage/logs
    - ./docs/.vitepress/dist:/var/www/public/docs:ro
    - ./backend/certs:/etc/nginx/certs:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - default
    - shared-services
  healthcheck:
    test:
      - CMD
      - curl
      - -f
      - http://localhost/api/version
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s
  restart: unless-stopped

services:
  backend:
    <<: *backend-common
    ports:
      - "${BACKEND_HOST_BIND:-0.0.0.0}:${BACKEND_HOST_PORT:-8000}:80"
      - "${REVERB_HOST_BIND:-0.0.0.0}:${REVERB_HOST_PORT:-8080}:8080"

  backend_a:
    <<: *backend-common
    profiles:
      - slot-a
    ports:
      - "${SLOT_A_BACKEND_HOST_BIND:-127.0.0.1}:${SLOT_A_BACKEND_HOST_PORT:-8001}:80"
      - "${SLOT_A_REVERB_HOST_BIND:-127.0.0.1}:${SLOT_A_REVERB_HOST_PORT:-8081}:8080"

  backend_b:
    <<: *backend-common
    profiles:
      - slot-b
    ports:
      - "${SLOT_B_BACKEND_HOST_BIND:-127.0.0.1}:${SLOT_B_BACKEND_HOST_PORT:-8002}:80"
      - "${SLOT_B_REVERB_HOST_BIND:-127.0.0.1}:${SLOT_B_REVERB_HOST_PORT:-8082}:8080"

  https-proxy:
    image: nginx:alpine
    profiles:
      - https
    depends_on:
      - backend
    ports:
      - "${HTTPS_HTTP_HOST_BIND:-0.0.0.0}:${HTTPS_HTTP_HOST_PORT:-80}:80"
      - "${HTTPS_HTTPS_HOST_BIND:-0.0.0.0}:${HTTPS_HTTPS_HOST_PORT:-443}:443"
    volumes:
      - ./backend/certs:/etc/nginx/certs:ro
      - ./backend/nginx-https-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    profiles:
      - local-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meo_mai_moi}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      # Create additional test database for PHPUnit tests to prevent wiping dev data
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-meo_mai_moi_testing}
    ports:
      - "${DB_HOST_BIND:-0.0.0.0}:${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init script to create test database
      - ./backend/scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      # Use container env vars (escaped $ -> $$) so expansion happens inside container, not by compose
      test:
        - CMD-SHELL
        - PGUSER=$${POSTGRES_USER} PGPASSWORD=$${POSTGRES_PASSWORD} pg_isready -q -d $${POSTGRES_DB} -h 127.0.0.1 -p 5432 && PGPASSWORD=$${POSTGRES_PASSWORD} psql -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 -c 'SELECT 1'
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    profiles:
      - testing
      - e2e
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
  logs_data:

networks:
  shared-services:
    name: ${SHARED_SERVICES_NETWORK_NAME:-shared-services}
    external: ${SHARED_SERVICES_NETWORK_EXTERNAL:-false}
