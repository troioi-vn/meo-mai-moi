when:
  - event: push
    branch: dev

steps:
  deploy_dev:
    image: alpine:3.20
    environment:
      CATARCHY2_HOST:
        from_secret: CATARCHY2_HOST
      CATARCHY2_USER:
        from_secret: CATARCHY2_USER
      CATARCHY2_SSH_KEY:
        from_secret: CATARCHY2_SSH_KEY
      DEV_DEPLOY_PATH:
        from_secret: DEV_DEPLOY_PATH
    commands:
      - apk add --no-cache openssh-client git bash
      - install -m 700 -d ~/.ssh
      - printf '%s' "$CATARCHY2_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan -H "$CATARCHY2_HOST" >> ~/.ssh/known_hosts
      - |
        ssh -i ~/.ssh/id_ed25519 "$CATARCHY2_USER@$CATARCHY2_HOST" \
          "cd '$DEV_DEPLOY_PATH' && \
          git fetch --prune origin && \
          git checkout dev && \
          git reset --hard '$CI_COMMIT_SHA' && \
          CI_COMMIT_BRANCH='dev' CI_COMMIT_SHA='$CI_COMMIT_SHA' ./utils/deploy-ci-dev.sh"
