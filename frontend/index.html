<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" id="app-manifest" href="/site-light.webmanifest" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      ;(function () {
        // Persist deferred install prompt globally so React hooks mounted later
        // (e.g. after auth) can still access it.
        window.__deferredInstallPrompt = null

        window.addEventListener('beforeinstallprompt', (event) => {
          event.preventDefault()
          window.__deferredInstallPrompt = event
        })

        window.addEventListener('appinstalled', () => {
          window.__deferredInstallPrompt = null
        })
      })()
    </script>
    <title>Meo Mai Moi</title>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
